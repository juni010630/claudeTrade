# =============================================================================
# Scalping Parameter Hub  ·  5m/1m 초단타 전용
# =============================================================================

backtest:
  start: "2024-10-01"
  end:   "2025-03-01"
  initial_capital: 100_000

symbols:
  - BTCUSDT
  - ETHUSDT

timeframes:
  - 1m
  - 5m
  - 15m
  - 1h          # 거시 추세 필터용
primary_timeframe: 5m

data:
  exchange: binanceusdm
  cache_dir: data/cache
  lookback_bars: 300

# ---------------------------------------------------------------------------
# 스캘핑 전략
# ---------------------------------------------------------------------------
strategies:

  scalp_vwap:
    enabled: true
    # VWAP 크로스 + RSI 모멘텀 + 거래량 확인
    rsi_period: 9
    rsi_long_min: 45.0
    rsi_short_max: 55.0
    volume_multiplier: 1.3
    volume_lookback: 20
    vwap_tolerance: 0.002       # VWAP 근접 허용 범위 (0.2%)
    atr_period: 14
    atr_tp_mult: 1.0
    atr_sl_mult: 0.5
    timeframe: "5m"

  scalp_ema_ribbon:
    enabled: true
    # EMA 5/8/13/21 리본 정렬 후 눌림목 진입
    ema_periods: [5, 8, 13, 21]
    rsi_period: 9
    rsi_long_min: 48.0
    rsi_long_max: 70.0
    rsi_short_max: 52.0
    rsi_short_min: 30.0
    atr_period: 14
    atr_tp_mult: 1.2
    atr_sl_mult: 0.6
    volume_multiplier: 1.2
    timeframe: "5m"
    trend_tf: "15m"             # 추세 확인용 상위 타임프레임

  scalp_bb_rsi:
    enabled: true
    # 볼린저밴드 스퀴즈 → 브레이크아웃 + RSI 확인
    bb_period: 20
    bb_std: 2.0
    squeeze_pct: 0.25           # BB 폭 하위 25% = 스퀴즈
    rsi_period: 14
    rsi_long_min: 52.0
    rsi_short_max: 48.0
    volume_multiplier: 1.5
    atr_period: 14
    atr_tp_mult: 1.3
    atr_sl_mult: 0.5
    timeframe: "5m"

# ---------------------------------------------------------------------------
# 시장 국면 (1h 기준 거시 필터)
# ---------------------------------------------------------------------------
regime:
  adx_period: 14
  adx_trending_threshold: 25.0
  adx_ranging_threshold: 20.0
  bb_period: 20
  bb_std: 2.0
  bb_width_lookback: 50
  bb_width_squeeze_pct: 0.2
  primary_tf: "1h"

# ---------------------------------------------------------------------------
# 컨플루언스 스코어 (완화된 기준 — 스캘핑은 빠른 신호가 필요)
# ---------------------------------------------------------------------------
scorer:
  volume_ratio_threshold: 1.2
  rsi_long_max: 70.0
  rsi_short_min: 30.0
  funding_long_max: 0.0005
  funding_short_min: -0.0005
  daily_ema_period: 200
  tier_s_min_score: 4
  tier_a_min_score: 2
  tier_b_min_score: 1

# ---------------------------------------------------------------------------
# 리스크 (스캘핑: 타이트하게)
# ---------------------------------------------------------------------------
risk:
  max_positions: 2
  max_same_direction: 2
  daily_drawdown_pause: -0.03
  daily_drawdown_stop:  -0.05
  circuit_breaker_pause_losses: 8
  circuit_breaker_stop_losses: 15
  circuit_breaker_pause_hours: 24
  correlation_block_threshold: 0.85
  correlation_lookback: 50
  risk_per_trade: 0.005         # 거래당 0.5% 리스크

# ---------------------------------------------------------------------------
# 레버리지 티어 (스캘핑: 낮은 레버리지, 많은 거래)
# ---------------------------------------------------------------------------
leverage_tiers:
  S: {leverage: 5,  size_fraction: 0.20}
  A: {leverage: 3,  size_fraction: 0.15}
  B: {leverage: 2,  size_fraction: 0.10}

# ---------------------------------------------------------------------------
# 체결 비용
# ---------------------------------------------------------------------------
execution:
  commission_maker: 0.0002
  commission_taker: 0.0005
  funding_interval_hours: 8
  default_slippage_bps: 3.0

# ---------------------------------------------------------------------------
# 스캘핑 전용 옵션
# ---------------------------------------------------------------------------
scalping:
  max_hold_hours: 4.0           # 최대 보유 시간 (초과 시 강제 청산)
  price_tf: "5m"                # MTM/TP-SL 가격 참조 타임프레임
