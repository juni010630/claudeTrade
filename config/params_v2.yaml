# =============================================================================
# Swing V2 — WF Trial #1 최적 파라미터 (워크포워드 최적화)
# WF점수 0.6851
# 훈련(2022-2023): Sharpe 0.443  ret +22.1%  MDD -34.1%
# 검증(2024-2025): Sharpe 0.710  ret +16.4%  MDD -15.9%
# 이전: params_v2.yaml Trial #41 (Sharpe 2.027, MDD -5.8%, +40.5%)
# =============================================================================

backtest:
  start: '2024-01-01'
  end: '2025-03-01'
  initial_capital: 100000
symbols:
- BTCUSDT
- ETHUSDT
- SOLUSDT
- BNBUSDT
- XRPUSDT
- AVAXUSDT
timeframes:
- 1h
- 4h
- 1d
primary_timeframe: 1h
data:
  exchange: binanceusdm
  cache_dir: data/cache
  lookback_bars: 300
strategies:
  momentum_breakout:
    enabled: true
    bb_period: 20
    bb_std: 1.8
    volume_multiplier: 2.0
    volume_lookback: 15
    atr_period: 14
    atr_tp_mult: 3.0
    atr_sl_mult: 0.6
    timeframe: 1h
  ema_cross:
    enabled: false
  mean_reversion:
    enabled: true
    bb_period: 20
    bb_std: 1.8
    rsi_period: 14
    rsi_oversold: 30.0
    rsi_overbought: 70.0
    funding_long_max: 0.0001
    funding_short_min: 0.0001
    oi_cascade_threshold: 5.0
    atr_period: 14
    atr_tp_mult: 2.0
    atr_sl_mult: 1.0
    timeframe: 1h
  multi_tf_breakout:
    enabled: true
    bb_period: 20
    bb_std_4h: 1.8
    bb_std_1h: 1.5
    rsi_period: 14
    rsi_long_min: 50.0
    rsi_short_max: 50.0
    volume_multiplier: 2.0
    volume_lookback: 20
    atr_period: 14
    atr_tp_mult: 2.0
    atr_sl_mult: 1.2
    daily_ema_period: 200
    signal_tf: 1h
    confirm_tf: 4h
    filter_tf: 1d
  supertrend:
    enabled: false
  donchian_breakout:
    period: 30
    confirm_period: 12
    atr_tp_mult: 2.0
    atr_sl_mult: 1.2
    volume_multiplier: 1.2
regime:
  adx_period: 14
  adx_trending_threshold: 22.0
  adx_ranging_threshold: 20.0
  bb_period: 20
  bb_std: 2.0
  bb_width_lookback: 50
  bb_width_squeeze_pct: 0.3
  primary_tf: 1h
scorer:
  volume_ratio_threshold: 1.5
  rsi_long_max: 65.0
  rsi_short_min: 40.0
  funding_long_max: 0.0003
  funding_short_min: -0.0003
  daily_ema_period: 200
  tier_ss_min_score: 7
  tier_s_min_score: 6
  tier_a_min_score: 3
  tier_b_min_score: 2
  tier_c_min_score: 1
risk:
  max_positions: 5
  max_same_direction: 3
  daily_drawdown_pause: -0.06
  daily_drawdown_stop: -0.1
  circuit_breaker_pause_losses: 5
  circuit_breaker_stop_losses: 10
  circuit_breaker_pause_hours: 48
  correlation_block_threshold: 0.9
  correlation_lookback: 100
  risk_per_trade: 0.012
leverage_tiers:
  SS:
    leverage: 18
    size_fraction: 0.35
  S:
    leverage: 12
    size_fraction: 0.22
  A:
    leverage: 5
    size_fraction: 0.15
  B:
    leverage: 4
    size_fraction: 0.08
  C:
    leverage: 2
    size_fraction: 0.05
execution:
  commission_maker: 0.0002
  commission_taker: 0.0005
  funding_interval_hours: 8
  default_slippage_bps: 5.0
